name: Deploy Next.js site to Pages
env:
    NEXT_PUBLIC_EMAIL_SERVICE_ID: ${{ vars.NEXT_PUBLIC_EMAIL_SERVICE_ID }}
    NEXT_PUBLIC_EMAIL_TEMPLATE_ID: ${{ vars.NEXT_PUBLIC_EMAIL_TEMPLATE_ID }}
    NEXT_PUBLIC_EMAIL_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_EMAIL_PUBLIC_KEY }}
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out


  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4

        